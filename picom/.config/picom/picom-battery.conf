# Picom config LEVE - usado automaticamente quando esta na bateria
# Sem blur, sem sombra, sem rounded corners = GPU descansa

# ============================================================
# CANTOS ARREDONDADOS - desabilitado
# ============================================================
corner-radius = 0;

# ============================================================
# SOMBRAS - desabilitado
# ============================================================
shadow = false;

# ============================================================
# FADE - desabilitado
# ============================================================
fading = false;

# ============================================================
# TRANSPARENCIA/OPACIDADE
# ============================================================
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
inactive-dim = 0.0;

opacity-rule = [
    "85:class_g = 'kitty'"
];

focus-exclude = [
    "class_g = 'Cairo-clock'"
];

# ============================================================
# BLUR - desabilitado
# ============================================================
blur-method = "none";

# ============================================================
# BACKEND
# ============================================================
backend = "glx";
vsync = true;

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

glx-no-stencil = true;
use-damage = true;

log-level = "warn";
