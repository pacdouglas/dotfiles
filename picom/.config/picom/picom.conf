# Picom config - equivalente as decorations do Hyprland
# Rounded corners, shadows, fade

# ============================================================
# CANTOS ARREDONDADOS (equivalente a rounding=10 do Hyprland)
# ============================================================
corner-radius = 10;

rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'"
];

# ============================================================
# SOMBRAS (equivalente ao shadow do Hyprland)
# ============================================================
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.90;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-color = "#000000";

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g = 'Polybar'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ============================================================
# FADE (equivalente as animations de fade do Hyprland)
# ============================================================
fading = false;
fade-in-step = 0.1;
fade-out-step = 0.1;
fade-delta = 10;

# ============================================================
# TRANSPARENCIA/OPACIDADE
# ============================================================
inactive-opacity = 0.90;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
inactive-dim = 0.05;

# Permite que o kitty controle sua propria opacidade
opacity-rule = [
    "85:class_g = 'kitty'"
];

focus-exclude = [
    "class_g = 'Cairo-clock'"
];

# ============================================================
# BLUR (equivalente ao blur do Hyprland)
# ============================================================
blur-method = "dual_kawase";
blur-size = 3;
blur-strength = 3;

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ============================================================
# BACKEND
# ============================================================
backend = "glx";
vsync = true;

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

glx-no-stencil = true;
use-damage = true;

log-level = "warn";
