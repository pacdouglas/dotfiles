; Polybar config - Catppuccin Mocha theme

[colors]
rosewater = #f5e0dc
flamingo = #f2cdcd
pink = #f5c2e7
mauve = #cba6f7
red = #f38ba8
maroon = #eba0ac
peach = #fab387
yellow = #f9e2af
green = #a6e3a1
teal = #94e2d5
sky = #89dceb
sapphire = #74c7ec
blue = #89b4fa
lavender = #b4befe
text = #cdd6f4
subtext1 = #bac2de
subtext0 = #a6adc8
overlay2 = #9399b2
overlay1 = #7f849c
overlay0 = #6c7086
surface2 = #585b70
surface1 = #45475a
surface0 = #313244
base = #1e1e2e
mantle = #181825
crust = #11111b

background = ${colors.crust}
foreground = ${colors.overlay0}
alert = #eb4d4b

; ============================================================
; BAR
; ============================================================
[bar/main]
width = 100%
height = 20pt
radius = 0
dpi = 0

background = ${colors.background}
foreground = ${colors.foreground}

border-bottom-size = 1
border-bottom-color = ${colors.overlay1}

padding-left = 1
padding-right = 1
module-margin = 1

font-0 = JetBrainsMono Nerd Font:style=Bold:size=12;3
font-1 = JetBrainsMono Nerd Font:style=Bold:size=13;3

modules-left = i3 spotify
modules-center = xwindow
modules-right = tray pomodoro weather cpu memory mic pulseaudio network battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = i3

; ============================================================
; MODULES
; ============================================================

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true

label-focused = %name%
label-focused-background = #4d000000
label-focused-foreground = ${colors.mauve}
label-focused-underline = ${colors.mauve}
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-padding = 1

label-visible = %name%
label-visible-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = ${colors.text}

[module/tray]
type = internal/tray
tray-spacing = 10pt
tray-size = 65%

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5

format-volume = <ramp-volume> <label-volume>
format-volume-foreground = ${colors.blue}
label-volume = %percentage%%

format-muted-foreground = ${colors.overlay0}
label-muted = %{T2}%{T-} muted

ramp-volume-0 = %{T2}%{T-}
ramp-volume-1 = %{T2}%{T-}
ramp-volume-2 = %{T2}%{T-}

click-right = pavucontrol

[module/network]
type = internal/network
interface-type = wireless
interval = 5

format-connected = <label-connected>
label-connected = %{T2}%{T-}
label-connected-foreground = ${colors.yellow}

format-disconnected = <label-disconnected>
label-disconnected = %{T2}󰤭%{T-}
label-disconnected-foreground = ${colors.yellow}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = AC

format-charging = <label-charging>
label-charging = %{T2}󰂄%{T-} %percentage%%
label-charging-foreground = ${colors.green}

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%
label-discharging-foreground = ${colors.green}

format-full = <label-full>
label-full = %{T2}%{T-} %percentage%%
label-full-foreground = ${colors.green}

format-low = <label-low>
label-low = %{T2}%{T-} %percentage%%
label-low-foreground = ${colors.red}

ramp-capacity-0 = %{T2}%{T-}
ramp-capacity-1 = %{T2}%{T-}
ramp-capacity-2 = %{T2}%{T-}
ramp-capacity-3 = %{T2}%{T-}
ramp-capacity-4 = %{T2}%{T-}
ramp-capacity-foreground = ${colors.green}

[module/date]
type = internal/date
interval = 30

date = %a %d %H:%M

label = %{T2} %{T-}%date%
label-foreground = ${colors.maroon}

[module/spotify]
type = custom/script
exec = ~/.config/polybar/scripts/spotify.sh
interval = 3
label-foreground = ${colors.green}
click-left = playerctl -p spotify play-pause
click-right = playerctl -p spotify next

[module/weather]
type = custom/script
exec = ~/.config/polybar/scripts/weather.sh
interval = 1800
label-foreground = ${colors.sky}

[module/pomodoro]
type = custom/script
exec = ~/.config/polybar/scripts/pomodoro.sh
interval = 1
label-foreground = ${colors.peach}
click-left = ~/.config/polybar/scripts/pomodoro.sh toggle
click-right = ~/.config/polybar/scripts/pomodoro.sh reset


[module/cpu]
type = internal/cpu
interval = 5

format = <label>
label = %{T2}%{T-} %percentage%%
label-foreground = ${colors.lavender}

[module/memory]
type = internal/memory
interval = 5

format = <label>
label = %{T2}%{T-} %percentage_used%%
label-foreground = ${colors.pink}

[module/mic]
type = custom/script
exec = ~/.config/polybar/scripts/mic.sh
interval = 1
label-foreground = ${colors.teal}
click-left = ~/.config/polybar/scripts/mic.sh toggle

[settings]
screenchange-reload = true
pseudo-transparency = true
